version: "3.9"

services:
  app:
    build: .
    restart: always
    volumes:
      - .:/app 
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: 1234
      DB_NAME: kougi_db

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: kougi_db
    ports:
      - "3307:3306"